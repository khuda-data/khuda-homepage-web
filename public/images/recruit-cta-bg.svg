<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" fill="none">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141418;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Soft glow filter -->
    <filter id="glowSoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="glowMedium" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="500" fill="url(#bgGrad)"/>
  
  <!-- Simple ambient glows -->
  <ellipse cx="200" cy="200" rx="400" ry="300" fill="#4a7bc8" opacity="0.08" filter="url(#glowSoft)"/>
  <ellipse cx="1400" cy="300" rx="350" ry="250" fill="#4a7bc8" opacity="0.06" filter="url(#glowSoft)"/>
  <ellipse cx="800" cy="400" rx="500" ry="200" fill="#a83d3d" opacity="0.05" filter="url(#glowSoft)"/>
  
  <!-- Subtle accent glows -->
  <ellipse cx="300" cy="150" rx="200" ry="150" fill="#4a7bc8" opacity="0.12" filter="url(#glowMedium)"/>
  <ellipse cx="1300" cy="200" rx="180" ry="140" fill="#a83d3d" opacity="0.08" filter="url(#glowMedium)"/>
</svg>